<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Generate Style Icons</title>
  <style>
    body { font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f5f5f5; gap: 24px; }
    canvas { border-radius: 22%; box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
    button { padding: 10px 24px; background: #5B9EC9; color: white; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; }
    p { color: #666; font-size: 14px; margin: 0; }
  </style>
</head>
<body>
  <p>Click each button to download the icon files, then place them in your style/ folder.</p>
  <canvas id="c512" width="512" height="512"></canvas>
  <button onclick="download(512)">Download icon-512.png</button>
  <canvas id="c192" width="192" height="192"></canvas>
  <button onclick="download(192)">Download icon-192.png</button>

  <script>
    const SVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="#5B9EC9"/>
  <path d="M 188,104 L 214,104 Q 217,160 256,174 Q 295,160 298,104 L 324,104 L 358,268 Q 420,346 420,432 L 92,432 Q 92,346 154,268 Z"
        fill="none" stroke="white" stroke-width="22" stroke-linejoin="round" stroke-linecap="round"/>
</svg>`;

    function drawToCanvas(size) {
      const canvas = document.getElementById(`c${size}`);
      const ctx = canvas.getContext('2d');
      const img = new Image();
      const blob = new Blob([SVG], { type: 'image/svg+xml' });
      const url = URL.createObjectURL(blob);
      img.onload = () => {
        ctx.drawImage(img, 0, 0, size, size);
        URL.revokeObjectURL(url);
      };
      img.src = url;
    }

    function download(size) {
      const canvas = document.getElementById(`c${size}`);
      const a = document.createElement('a');
      a.download = `icon-${size}.png`;
      a.href = canvas.toDataURL('image/png');
      a.click();
    }

    drawToCanvas(512);
    drawToCanvas(192);
  </script>
</body>
</html>
